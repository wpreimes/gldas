on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
        # todo: on TUW-GLDAS URL only?

name: Release Package
jobs:
  release:
    name: Create Package Release 📦
    runs-on: ubuntu-latest
    steps: # see also https://github.com/actions/create-release
      - name: Checkout code
        uses: actions/checkout@v2
#      # This step will retry until required check passes
#      # and will fail the whole workflow if the check conclusion is not a success
#      - name: Wait on tests
#      uses: lewagon/wait-on-check-action@master # We are in the early stages of release process, so using master is your best bet
#      with:
#        ref: master # can be commit SHA or tag too
#        check-name: test # name of the existing check - omit to wait for all checks
#        repo-token: ${{ secrets.GITHUB_TOKEN }}
#        wait-interval: 20 # seconds
      - name: Create Release
        # id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: ./CHANGELOG.rst
          draft: false
          prerelease: false
  publish:
    name: Upload to Pypi 🚀
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          repository: ${{ github.repository }} # add TUW repo to be sure?
          ref: ${{ github.ref }} # make sure to checkout tag
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - name: Build # todo: bdist_wheel as well?
        shell: bash -l {0}
        run: |
          python setup.py --version
          python setup.py sdist
#      - name: Install dependencies
#        shell: bash -l {0}
#        run: |
#          pip3 install setuptools wheel twine
#          python setup.py --version
#          python setup.py sdist # bdist_wheel
      - name: Publish distribution to Test PyPI
        # if: startsWith(github.ref, 'refs/tags') # todo: add for safety for real pypi
        uses: pypa/gh-action-pypi-publish@v1.4.1
        with:
          skip_existing: true
          verbose: true
          verify_metadata: true
          packages_dir: dist/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }} # todo: change token for real pypi
          repository_url: https://test.pypi.org/legacy/ # todo: delete for real pypi